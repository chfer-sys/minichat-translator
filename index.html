<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniChat Translator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MiniChat Translator</h1>
      <div class="header-actions">
        <button class="status-btn" id="statusBtn" title="Check API status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Check</span>
        </button>
        <button class="history-btn" id="historyBtn">History</button>
      </div>
    </div>
    <p class="subtitle">Powered by MiniMax AI</p>

    <!-- History Panel -->
    <div class="history-panel" id="historyPanel">
      <div class="history-list" id="historyList"></div>
      <div class="history-footer" id="historyFooter" style="display:none;">
        <button class="history-export-btn" id="exportHistoryBtn" style="background:none;border:none;color:var(--accent);font-size:0.8125rem;cursor:pointer;opacity:0.8;transition:opacity 0.2s;">Export CSV</button>
        <span style="color:var(--border);margin:0 0.5rem;">|</span>
        <button class="history-clear-btn" id="clearHistoryBtn">Clear all history</button>
      </div>
    </div>

    <div class="card">
      <div class="lang-selector">
        <button class="lang-btn active" data-dir="en-zh">EN → ZH</button>
        <button class="lang-btn" data-dir="zh-en">ZH → EN</button>
      </div>

      <div class="input-wrap">
        <textarea id="input" placeholder="Enter text to translate..."></textarea>
        <span class="char-count" id="charCount">0 chars</span>
      </div>

      <button class="translate-btn" id="translateBtn">Translate</button>

      <div class="output-wrap" id="outputWrap" style="display:none;">
        <span class="output-label">Translation</span>
        <button class="copy-btn" id="copyBtn">Copy</button>
        <div class="output-text" id="output"></div>
        <div id="pinyinSection" style="display:none;">
          <button class="pinyin-toggle" id="pinyinToggle">Show Pinyin</button>
          <div class="pinyin-text" id="pinyinText"></div>
        </div>
      </div>

      <div class="error" id="error"></div>
    </div>

    <p class="pwa-note" id="pwaNote">Add to home screen for the full PWA experience</p>
  </div>

  <script type="module" src="/src/ui.js"></script>
</body>
</html>
