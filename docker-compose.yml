services:
  minichat-translator:
    image: nginx:alpine
    container_name: minichat-translator
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/usr/share/nginx/html:ro
    environment:
      - TZ=America/New_York

  minichat-proxy:
    build: ./proxy
    container_name: minichat-proxy
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - OPENCODE_GO_API_KEY=${OPENCODE_GO_API_KEY}
